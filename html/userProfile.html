<!DOCTYPE html>
<html lang="uk">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Noble Art - Профіль</title>
   <link rel="stylesheet" href="/css/userProfile.css">
   <script src="/service/userProfile.js"></script>
   <style>
      .delete-btn {
         background: transparent;
         border: none;
         cursor: pointer;
         color: #ff4444;
         font-size: 20px;
      }

      .delete-btn:hover {
         color: #cc0000;
      }
   </style>
</head>

<body>

   <aside class="sidebar">
      <div class="logo">Noble Art</div>
      <div class="user-profile">
         <div class="user-info">
            <h3>Root</h3>
            <p>owner</p>
         </div>
      </div>
      <ul class="nav-menu">
         <li><a href="#mycollection" class="active">Моя колекція</a></li>
         <li><a href="/html/main.html" class="logout">На головну</a></li>
      </ul>
   </aside>

   <main class="main-content">
      <h1 id="mycollection">Моя колекція</h1>

      <div class="card">
         <div class="search-box">
            <input type="text" id="searchInput" placeholder="Пошук по збережених..." onkeyup="searchTable()">
         </div>

         <table>
            <thead>
               <tr>
                  <th style="width: 35%;">Картина</th>
                  <th style="width: 55%;">Опис</th>
                  <th style="width: 10%; text-align: center;">Дії</th>
               </tr>
            </thead>
            <tbody id="collectionBody">
            </tbody>
         </table>
      </div>

   </main>

</body>

</html>
